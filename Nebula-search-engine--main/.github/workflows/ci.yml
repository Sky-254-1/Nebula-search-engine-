name: CI

on:
  push:
    branches: [main, 'hardening-*']
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install ruff
      - run: ruff check app/ tests/ --exit-zero

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio pytest-cov
      - run: python -m pytest tests/ --cov=app --cov-report=term --cov-report=xml -x -q
      - uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          fail_ci_if_error: false

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run lint --if-present

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run build --if-present

  e2e-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nebula_test
          POSTGRES_USER: nebula
          POSTGRES_PASSWORD: nebula
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: pip install -r backend/requirements.txt
      - run: npm ci --ignore-scripts
        working-directory: frontend
      - run: npx playwright install chromium --with-deps
        working-directory: frontend
      - name: Start backend
        env:
          DATABASE_URL: postgresql://nebula:nebula@localhost:5432/nebula_test
          JWT_SECRET: test-secret-for-e2e
          APP_ENV: testing
          CORS_ORIGINS: "*"
          RATE_LIMIT_PER_MINUTE: "1000"
        run: |
          cd backend
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
      - name: Start frontend
        run: |
          cd frontend
          nohup npx vite --port 5173 --host 0.0.0.0 &
          sleep 3
      - name: Run E2E tests
        env:
          CI: "true"
        run: npx playwright test --config=tests/e2e/playwright.config.ts
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t nebula-backend -f docker/Dockerfile .
      - run: docker build -t nebula-frontend -f docker/frontend.Dockerfile .
