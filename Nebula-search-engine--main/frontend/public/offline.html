<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0c10" />
  <title>Offline - Nebula Search</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #0b0c10;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .offline-container { text-align: center; max-width: 400px; }
    .offline-icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    p { color: rgba(224,224,224,0.6); margin-bottom: 1.5rem; line-height: 1.5; }
    .btn {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      border-radius: 999px;
      background: #7c5cfc;
      color: #fff;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }
    .btn:hover { background: #6a4ae8; }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">🔭</div>
    <h1>You're offline</h1>
    <p>Nebula Search will work once you're back online. Check your connection and try again.</p>
    <button class="btn" onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
