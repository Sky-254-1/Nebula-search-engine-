# Production overrides for Nebula Search v1.0
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    environment:
      APP_ENV: production
      RATE_LIMIT_PER_MINUTE: 120
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --log-level info

  frontend:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  postgres:
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  redis:
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
