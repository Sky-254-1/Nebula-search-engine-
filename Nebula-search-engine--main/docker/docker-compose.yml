services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nebula
      POSTGRES_PASSWORD: nebula
      POSTGRES_DB: nebula
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebula"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql://nebula:nebula@postgres:5432/nebula
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      STORAGE_ROOT: /app/storage
    volumes:
      - nebula-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  vector-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "vector.worker"]
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql://nebula:nebula@postgres:5432/nebula
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      STORAGE_ROOT: /app/storage
    volumes:
      - nebula-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  nebula-storage:
