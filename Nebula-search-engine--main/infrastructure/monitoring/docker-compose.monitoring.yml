services:
  prometheus:
    image: prom/prometheus:latest
    container_name: nebula-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"
    networks:
      - nebula-monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: nebula-grafana
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_PROVISIONING_PATH=/etc/grafana/provisioning
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_UID=nebula-engineering
    ports:
      - "3000:3000"
    networks:
      - nebula-monitoring
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: nebula-loki
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    command:
      - "-config.file=/etc/loki/loki-config.yml"
    ports:
      - "3100:3100"
    networks:
      - nebula-monitoring
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: nebula-promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command:
      - "-config.file=/etc/promtail/promtail-config.yml"
      - "-config.expand-env=true"
    environment:
      - LOKI_URL=http://loki:3100
    networks:
      - nebula-monitoring
    depends_on:
      - loki
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: nebula-alertmanager
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/data
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/data"
      - "--web.external-url=http://localhost:9093"
    ports:
      - "9093:9093"
    networks:
      - nebula-monitoring
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: nebula-node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - nebula-monitoring
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: nebula-postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://nebula:nebula@postgres:5432/nebula?sslmode=disable
      - PG_EXPORTER_AUTO_DISABLE_DEFAULT_METRICS=false
    ports:
      - "9187:9187"
    networks:
      - nebula-monitoring
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: nebula-redis-exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - nebula-monitoring
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: nebula-otel-collector
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    command:
      - "--config=/etc/otel-collector-config.yml"
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
    networks:
      - nebula-monitoring
    restart: unless-stopped

networks:
  nebula-monitoring:
    name: nebula-monitoring
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  alertmanager-data:
