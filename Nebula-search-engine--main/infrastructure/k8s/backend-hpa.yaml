apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nebula-backend-hpa
  namespace: nebula
  labels:
    app.kubernetes.io/name: nebula-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: nebula
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nebula-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
