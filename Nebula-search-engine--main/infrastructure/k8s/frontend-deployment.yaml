apiVersion: apps/v1
kind: Deployment
metadata:
  name: nebula-frontend
  namespace: nebula
  labels:
    app.kubernetes.io/name: nebula-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: nebula
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: nebula-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nebula-frontend
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: nebula
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: frontend
          image: nebula/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
