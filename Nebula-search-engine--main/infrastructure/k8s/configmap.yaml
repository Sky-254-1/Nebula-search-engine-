apiVersion: v1
kind: ConfigMap
metadata:
  name: nebula-config
  namespace: nebula
  labels:
    app.kubernetes.io/name: nebula-search
    app.kubernetes.io/part-of: nebula
data:
  # Database
  DATABASE_URL: "postgresql://nebula:nebula@nebula-postgres:5432/nebula"
  DB_HOST: "nebula-postgres"
  DB_PORT: "5432"
  DB_NAME: "nebula"
  DB_USER: "nebula"

  # Redis
  REDIS_URL: "redis://nebula-redis:6379/0"
  REDIS_HOST: "nebula-redis"
  REDIS_PORT: "6379"

  # JWT
  JWT_EXPIRY_HOURS: "24"
  REFRESH_TOKEN_DAYS: "30"
  JWT_ALGORITHM: "HS256"

  # AI providers
  AI_PROVIDER: "auto"
  OPENAI_BASE_URL: "https://api.openai.com/v1"
  OPENAI_MODEL: "gpt-3.5-turbo"
  OLLAMA_URL: "http://ollama:11434"
  OLLAMA_MODEL: "llama3.2"

  # Application
  APP_ENV: "production"
  CORS_ORIGINS: "https://nebula.example.com"
  CACHE_TTL_SECONDS: "300"
  RATE_LIMIT_PER_MINUTE: "60"
  STORAGE_ROOT: "/app/storage"

  # Security
  AUTH_COOKIE_MODE: "true"
  COOKIE_SECURE: "true"
  COOKIE_SAMESITE: "lax"
  ENABLE_RBAC: "true"
  ENABLE_REFRESH_REUSE_DETECTION: "true"
  ENABLE_AUDIT_LOGS: "true"
  MAX_LOGIN_ATTEMPTS: "5"
  LOGIN_LOCKOUT_MINUTES: "15"
  SIGNUP_RATE_LIMIT: "5"
  LOGIN_RATE_LIMIT: "5"
  REFRESH_RATE_LIMIT: "10"
