apiVersion: apps/v1
kind: Deployment
metadata:
  name: nebula-backend
  namespace: nebula
  labels:
    app.kubernetes.io/name: nebula-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: nebula
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: nebula-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nebula-backend
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: nebula
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: nebula/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: nebula-config
            - secretRef:
                name: nebula-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: storage
              mountPath: /app/storage
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: nebula-storage-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nebula-storage-pvc
  namespace: nebula
  labels:
    app.kubernetes.io/name: nebula-backend
    app.kubernetes.io/part-of: nebula
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
