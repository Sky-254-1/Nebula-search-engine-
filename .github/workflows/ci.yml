name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        working-directory: backend
        env:
          JWT_SECRET: ci-test-secret
          APP_ENV: testing
          DATABASE_URL: test_nebula.db
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=75
          pytest tests/test_new_api_domains.py -v --cov=app --cov-append

      - name: Verify app imports
        working-directory: backend
        run: python -c "from app.main import app; from vector.pipeline import index_document; print(app.title)"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          name: backend-coverage

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [test, frontend]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root and frontend deps
        run: |
          npm install
          cd frontend && npm ci

      - name: Install Playwright browsers
        run: npm run e2e:install

      - name: Run E2E tests
        env:
          CI: "true"
          JWT_SECRET: e2e-ci-secret
          APP_ENV: testing
          DATABASE_URL: e2e_ci.db
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 14
