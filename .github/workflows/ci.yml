name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  # ============================================
  # Backend Tests
  # ============================================
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        working-directory: backend
        env:
          JWT_SECRET: ci-test-secret
          APP_ENV: testing
          DATABASE_URL: test_nebula.db
        run: |
          python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing \
            --cov-report=xml \
            --ignore=tests/test_async.py \
            --ignore=tests/e2e/ \
            --ignore=tests/performance/ \
            --k="not test_chunk_text" 2>&1 | tee pytest_output.txt

      - name: Coverage validation
        working-directory: backend
        run: python scripts/ci_check_coverage.py

      - name: Verify app imports
        working-directory: backend
        run: python scripts/ci_verify_imports.py

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          name: backend-coverage

      - name: Run security hardening tests
        working-directory: backend
        run: |
          if [ -f test_security_fixes.py ]; then
            python -m pytest test_security_fixes.py -v
            echo "Security hardening tests passed"
          else
            echo "Security test file not found"
          fi

      - name: Backup test results
        if: always()
        run: |
          mkdir -p tests/integration
          echo "Backend test results available"

  # ============================================
  # Frontend Tests
  # ============================================
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Vitest unit tests
        run: npx vitest run --reporter=verbose
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  # ============================================
  # E2E Tests (End-to-End)
  # ============================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup E2E environment
        run: |
          echo "Setting up E2E testing environment..."
          docker compose down -v || true
          docker compose up -d postgres redis
          sleep 30

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements-dev.txt

      - name: Initialize test database
        working-directory: backend
        run: python -c "from app.database import init_db; import asyncio; asyncio.run(init_db())"

      - name: Run E2E tests
        working-directory: backend
        run: python -m pytest tests/e2e/ -v --tb=short --cov=app --cov-report=term-missing
        env:
          DATABASE_URL: postgresql://nebula:nebula_test@localhost:5432/nebula_test
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: testing
          JWT_SECRET: test_jwt_secret_key_min_32_chars_long!!

      - name: E2E test results
        if: always()
        run: |
          echo "E2E test execution completed"
          if [ -f backend/pytest_output.txt ]; then
            FAILED=$(grep -c "FAILED" backend/pytest_output.txt || echo 0)
            echo "E2E Tests - Failed: $FAILED"
            if [ "$FAILED" -gt 0 ]; then
              echo "E2E tests have failures"
              cat backend/pytest_output.txt
            else
              echo "All E2E tests passed"
            end if
          fi

      - name: Stop test services
        if: always()
        run: |
          echo "Stopping test services..."
          docker compose down -v

  # ============================================
  # Security Scanning
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit (Python security)
        run: |
          pip install bandit
          bandit -r backend/app/ -f json -o bandit-report.json || true

      - name: Check dependencies for vulnerabilities
        working-directory: backend
        run: |
          pip install safety
          safety check -r requirements.txt || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            **/safety-report.txt