name: Deploy to Production

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read
  deployments: write

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Snyk security scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  test:
    name: Run Full Test Suite
    runs-on: ubuntu-latest
    needs: security-scan
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run all tests with coverage
        working-directory: backend
        env:
          JWT_SECRET: ci-test-secret
          APP_ENV: testing
          DATABASE_URL: test_nebula.db
        run: |
          pytest --cov=app --cov-report=xml --cov-fail-under=80
          pytest tests/test_new_api_domains.py -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: true

  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install locust

      - name: Start backend server
        working-directory: backend
        env:
          JWT_SECRET: perf-test-secret
          APP_ENV: testing
          DATABASE_URL: perf_test.db
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health || exit 1

      - name: Run load test
        run: |
          locust -f tests/load/locustfile.py --headless -u 10 -r 2 --run-time 1m --host http://localhost:8000 --csv=load-test-results || true

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-results
          path: load-test-results_*
          retention-days: 30

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, performance-test]
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha=$(echo $GITHUB_SHA | cut -c1-7)"
          echo "tag=${GITHUB_REF##*/}"
          echo "date=$(date +%Y%m%d)"
          echo "version=${GITHUB_REF##*/}-${date}-${sha}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nebula-search:${{ steps.meta.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/nebula-search:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/nebula-search:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/nebula-search:buildcache,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.nebula-search.example.com
    
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/nebula-search
            docker-compose pull
            docker-compose up -d --force-recreate
            docker system prune -f
            sleep 10
            curl -f https://staging.nebula-search.example.com/health || exit 1

      - name: Run smoke tests
        run: |
          sleep 10
          curl -f https://staging.nebula-search.example.com/health || exit 1
          curl -f https://staging.nebula-search.example.com/api/v1/health || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://nebula-search.example.com
    
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Deploy to production'
            });
            console.log('Deployment ID:', deployment.data.id);

      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USERNAME }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/nebula-search
            docker-compose pull
            docker-compose up -d --force-recreate
            docker system prune -f
            sleep 15
            curl -f https://nebula-search.example.com/health || exit 1

      - name: Update deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deployments = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: 'production',
              sha: context.sha
            });
            
            if (deployments.data.length > 0) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployments.data[0].id,
                state: 'success',
                description: 'Deployment completed successfully'
              });
            }

      - name: Notify team
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{"text":"✅ Production deployment successful: ${{ github.sha }}"}'

      - name: Rollback on failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{"text":"❌ Production deployment failed: ${{ github.sha }}. Rolling back..."}'
          
          # Trigger rollback
          curl -X POST ${{ secrets.ROLLBACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{"sha":"${{ github.sha }}"}'