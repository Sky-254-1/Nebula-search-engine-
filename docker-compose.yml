version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ioismaster
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ioismain
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - ollama
    environment:
      DATABASE_URL: postgresql+asyncpg://ioismaster:secret@db:5432/ioismain
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./backend/storage:/app/storage

volumes:
  pgdata:
  ollama_data: