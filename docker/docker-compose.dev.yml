services:
  postgres:
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nebula}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nebula}
      POSTGRES_DB: ${POSTGRES_DB:-nebula}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nebula}"]
      interval: 5s
      timeout: 2s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  redis:
    ports: ["${REDIS_PORT:-6379}:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    command: redis-server --save "" --appendonly no

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: nebula-backend:dev
    ports: ["${BACKEND_PORT:-8000}:8000"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nebula}:${POSTGRES_PASSWORD:-nebula}@postgres:5432/${POSTGRES_DB:-nebula}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:5174}
      STORAGE_ROOT: /app/storage
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    volumes:
      - ./backend:/app/app:rw
      - ./backend/vector:/app/vector:rw
      - ./tests:/app/tests:ro
      - nebula-storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: nebula-worker:dev
    command: ["python", "-m", "vector.worker"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nebula}:${POSTGRES_PASSWORD:-nebula}@postgres:5432/${POSTGRES_DB:-nebula}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      STORAGE_ROOT: /app/storage
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    volumes:
      - nebula-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile.dev
    image: nebula-frontend:dev
    ports: ["${FRONTEND_PORT:-5173}:5173"]
    volumes:
      - ./frontend:/app/frontend:rw
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  nginx:
    ports: ["${NGINX_PORT:-3000}:80"]
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
