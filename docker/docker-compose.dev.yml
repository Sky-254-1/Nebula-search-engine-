services:
  postgres:
    build: {}
    image: nebula-postgres:dev
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: nebula
      POSTGRES_PASSWORD: nebula
      POSTGRES_DB: nebula
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebula"]
      interval: 5s
      timeout: 2s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    command: postgres -c shared_preload_libraries=pg_stat_statements

  redis:
    build: {}
    image: nebula-redis:dev
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    command: redis-server --save "" --appendonly no

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
      target: runtime
    image: nebula-backend:dev
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://nebula:nebula@postgres:5432/nebula
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:5174
      STORAGE_ROOT: /app/storage
      JWT_SECRET: dev-secret-change-in-production
    volumes:
      - ./backend:/app/app:rw
      - ./backend/vector:/app/vector:rw
      - nebula-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
      target: runtime
    image: nebula-worker:dev
    command: ["python", "-m", "vector.worker"]
    environment:
      DATABASE_URL: postgresql://nebula:nebula@postgres:5432/nebula
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      STORAGE_ROOT: /app/storage
      JWT_SECRET: dev-secret-change-in-production
    volumes:
      - nebula-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile.dev
    image: nebula-frontend:dev
    ports: ["5173:5173"]
    volumes:
      - ./frontend:/app/frontend:rw
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  nginx:
    build: {}
    image: nebula-nginx:dev
    ports: ["3000:80"]
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

networks:
  nebula-internal:
    driver: bridge
    internal: true
  nebula-public:
    driver: bridge

volumes:
  postgres-data:
  nebula-storage:
