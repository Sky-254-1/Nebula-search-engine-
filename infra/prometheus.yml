global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "nebula-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/metrics"
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:9187"]
  - job_name: "redis"
    static_configs:
      - targets: ["redis:9121"]
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
