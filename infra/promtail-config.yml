server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

# Static configuration for scraping log files
scrape_configs:
  # Backend application logs
  - job_name: nebula-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: nebula-backend
          __path__: /var/log/nebula/*.log

  # Nginx logs
  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          __path__: /var/log/nginx/*.log

  # Docker container logs (if running Loki on host)
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*.log

  # Application JSON logs
  - job_name: nebula-json
    static_configs:
      - targets:
          - localhost
        labels:
          job: nebula-json
          __path__: /app/logs/*.log

