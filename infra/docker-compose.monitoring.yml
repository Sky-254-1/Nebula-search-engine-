version: "3.8"

services:
  # Prometheus - metrics collection and alerting
  prometheus:
    image: prom/prometheus:latest
    container_name: nebula-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - nebula-monitoring
    restart: unless-stopped

  # Alertmanager - alert routing and notifications
  alertmanager:
    image: prom/alertmanager:latest
    container_name: nebula-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - nebula-monitoring
    restart: unless-stopped

  # Grafana - dashboards and visualization
  grafana:
    image: grafana/grafana:latest
    container_name: nebula-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_DEFAULT_THEME=dark
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - nebula-monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

  # Loki - log aggregation
  loki:
    image: grafana/loki:latest
    container_name: nebula-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - nebula-monitoring
    restart: unless-stopped

  # Promtail - log collection agent
  promtail:
    image: grafana/promtail:latest
    container_name: nebula-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/log:/var/log:ro
      - ../backend/logs:/var/log/nebula:ro
    networks:
      - nebula-monitoring
    depends_on:
      - loki
    restart: unless-stopped

  # Node Exporter - system metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: nebula-node-exporter
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - nebula-monitoring
    restart: unless-stopped

  # cAdvisor - container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: nebula-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - nebula-monitoring
    restart: unless-stopped
    privileged: true

networks:
  nebula-monitoring:
    driver: bridge

volumes:
  prometheus-data:
  alertmanager-data:
  grafana-data:
  loki-data: