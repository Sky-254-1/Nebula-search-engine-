apiVersion: apps/v1
kind: Deployment
metadata:
  name: nebula-vector-worker
  namespace: nebula
  labels:
    app.kubernetes.io/name: nebula-vector-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: nebula
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: nebula-vector-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nebula-vector-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: nebula
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 60
      containers:
        - name: vector-worker
          image: nebula/backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "vector.worker"]
          envFrom:
            - configMapRef:
                name: nebula-config
            - secretRef:
                name: nebula-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: storage
              mountPath: /app/storage
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: nebula-storage-pvc
