apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nebula-redis
  namespace: nebula
  labels:
    app.kubernetes.io/name: nebula-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: nebula
spec:
  serviceName: nebula-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nebula-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nebula-redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: nebula
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: redis
          args:
            - "--appendonly"
            - "yes"
            - "--save"
            - "900 1"
            - "--save"
            - "300 10"
            - "--save"
            - "60 10000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: nebula-redis-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nebula-redis-pvc
  namespace: nebula
  labels:
    app.kubernetes.io/name: nebula-redis
    app.kubernetes.io/part-of: nebula
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
