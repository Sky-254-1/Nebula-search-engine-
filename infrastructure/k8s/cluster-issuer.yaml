apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: nebula-letsencrypt
  labels:
    app.kubernetes.io/part-of: nebula
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@nebula.example.com
    privateKeySecretRef:
      name: nebula-letsencrypt-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nebula-tls-cert
  namespace: nebula
  labels:
    app.kubernetes.io/part-of: nebula
spec:
  secretName: nebula-tls
  issuerRef:
    name: nebula-letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - nebula.example.com
