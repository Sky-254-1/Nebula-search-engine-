global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.example.com:587"
  smtp_from: "alerts@nebula-search.io"
  smtp_auth_username: "alerts@nebula-search.io"
  smtp_auth_password: "smtp-password-placeholder"
  smtp_require_tls: true

  slack_api_url: "https://hooks.slack.com/services/T00000000/B00000000/placeholder-token"
  pagerduty_url: "https://events.pagerduty.com/v2/enqueue"

route:
  receiver: "default"
  group_by: ["alertname", "severity", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: "pagerduty-critical"
      repeat_interval: 15m
      continue: true
    - match:
        severity: critical
      receiver: "slack-critical"
      repeat_interval: 15m
      continue: true
    - match:
        severity: warning
      receiver: "slack-warning"
      repeat_interval: 1h
    - match:
        severity: critical
      receiver: "email-critical"
      repeat_interval: 15m
    - match:
        severity: warning
      receiver: "email-warning"
      repeat_interval: 1h

receivers:
  - name: "default"
    slack_configs:
      - channel: "#alerts"
        title: "{{ .GroupLabels.alertname }}"
        text: "{{ .CommonAnnotations.description }}"
        send_resolved: true

  - name: "slack-critical"
    slack_configs:
      - channel: "#alerts-critical"
        title: "[CRITICAL] {{ .GroupLabels.alertname }}"
        text: "{{ .CommonAnnotations.description }}"
        send_resolved: true
        color: "danger"

  - name: "slack-warning"
    slack_configs:
      - channel: "#alerts-warning"
        title: "[WARNING] {{ .GroupLabels.alertname }}"
        text: "{{ .CommonAnnotations.description }}"
        send_resolved: true
        color: "warning"

  - name: "email-critical"
    email_configs:
      - to: "oncall@nebula-search.io"
        subject: "[CRITICAL] {{ .GroupLabels.alertname }}"
        html: "<h2>{{ .GroupLabels.alertname }}</h2><p>{{ .CommonAnnotations.description }}</p>"
        send_resolved: true

  - name: "email-warning"
    email_configs:
      - to: "team@nebula-search.io"
        subject: "[WARNING] {{ .GroupLabels.alertname }}"
        html: "<h2>{{ .GroupLabels.alertname }}</h2><p>{{ .CommonAnnotations.description }}</p>"
        send_resolved: true

  - name: "pagerduty-critical"
    pagerduty_configs:
      - routing_key: "pagerduty-routing-key-placeholder"
        severity: critical
        description: "{{ .CommonAnnotations.summary }}"
        details:
          alert: "{{ .GroupLabels.alertname }}"
          description: "{{ .CommonAnnotations.description }}"
          instance: "{{ .Labels.instance }}"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "service"]
