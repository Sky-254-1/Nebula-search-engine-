apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    uid: loki
    jsonData:
      maxLines: 5000
      derivedFields:
        - name: trace_id
          matcherType: label
          matcherRegex: trace_id
          url: http://jaeger:16686/trace/$${__value.raw}
