apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nebula.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: nebula-backend
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: nebula
spec:
  replicas: {{ .Values.backend.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: nebula-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nebula-backend
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: APP_ENV
              value: {{ .Values.backend.env.APP_ENV | default "production" }}
            - name: LOG_LEVEL
              value: {{ .Values.backend.env.LOG_LEVEL | default "INFO" }}
            - name: LOG_JSON_FORMAT
              value: {{ .Values.backend.env.LOG_JSON_FORMAT | default "true" | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.backend.env.CORS_ORIGINS | default "" | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.auth.existingSecret }}
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.auth.existingSecret }}
                  key: jwt-secret
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.auth.existingSecret }}
                  key: redis-url
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: storage
              mountPath: /app/storage
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: {{ include "nebula.fullname" . }}-storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "nebula.fullname" . }}-storage
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: nebula-backend
    app.kubernetes.io/part-of: nebula
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.backend.storage.size }}
  storageClassName: {{ .Values.backend.storage.storageClass }}